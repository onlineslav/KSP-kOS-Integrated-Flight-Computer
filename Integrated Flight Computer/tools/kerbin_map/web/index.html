<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Kerbin Navigation Chart</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <aside class="sidebar">
    <h1>Kerbin Nav Chart</h1>

    <section>
      <h2>Data Paths</h2>
      <label>Basemap PNG
        <input id="mapPath" type="text" value="./data/kerbin_map.png">
      </label>
      <label>Beacons CSV
        <input id="beaconsPath" type="text" value="./data/ifc_beacons.csv">
      </label>
      <label>Plates CSV
        <input id="platesPath" type="text" value="./data/ifc_plates.csv">
      </label>
      <button id="reloadBtn" type="button">Reload</button>
    </section>

    <section>
      <h2>Layers</h2>
      <div class="layer-row">
        <input id="layerILS"         type="checkbox" checked>
        <span class="swatch" style="background:#ffd166"></span>
        <label for="layerILS">ILS thresholds</label>
      </div>
      <div class="layer-row">
        <input id="layerCenterlines" type="checkbox" checked>
        <span class="swatch swatch-line" style="border-color:#ffd166"></span>
        <label for="layerCenterlines">Approach centerlines</label>
      </div>
      <div class="layer-row">
        <input id="layerIAF"         type="checkbox" checked>
        <span class="swatch swatch-tri" style="border-color:#90be6d"></span>
        <label for="layerIAF">IAF fixes</label>
      </div>
      <div class="layer-row">
        <input id="layerFAF"         type="checkbox" checked>
        <span class="swatch" style="background:#ff9f1c"></span>
        <label for="layerFAF">FAF fixes</label>
      </div>
      <div class="layer-row">
        <input id="layerVOR"         type="checkbox" checked>
        <span class="swatch swatch-hex" style="border-color:#4cc9f0"></span>
        <label for="layerVOR">VOR</label>
      </div>
      <div class="layer-row">
        <input id="layerAPT"         type="checkbox" checked>
        <span class="swatch swatch-tri" style="border-color:#a8ff78; background:rgba(168,255,120,0.25)"></span>
        <label for="layerAPT">Airports</label>
      </div>
      <div class="layer-row">
        <input id="layerWPT"         type="checkbox" checked>
        <span class="swatch" style="background:#c9b8ff"></span>
        <label for="layerWPT">Custom waypoints</label>
      </div>
    </section>

    <section>
      <h2>Display</h2>
      <label><input id="showLabels" type="checkbox" checked> Show labels</label>
      <label><input id="showPseudo3D" type="checkbox" checked> Enable pseudo-3D altitude</label>
      <label><input id="showAltStems" type="checkbox" checked> Show altitude stems</label>
      <label>Height exaggeration
        <input id="heightExaggeration" type="range" min="1" max="20" value="6">
      </label>
      <label>Marker size
        <input id="markerSize" type="range" min="2" max="16" value="6">
      </label>
      <label>Plate route
        <select id="plateSelect">
          <option value="">(none)</option>
        </select>
      </label>
    </section>

    <section>
      <h2>Readout</h2>
      <div id="cursorReadout">--- ---</div>
      <div id="status">Not loaded.</div>
      <p class="hint">
        Scroll: zoom &nbsp;·&nbsp; Drag: pan<br>
        Shift + left-drag: tilt pseudo-3D<br>
        Double-click: fit view<br>
        Hover beacon: details
      </p>
    </section>

    <section>
      <h2>Plate Profile</h2>
      <label><input id="showPlateProfile" type="checkbox" checked> Show selected plate side profile</label>
      <canvas id="profileCanvas" width="420" height="170"></canvas>
      <div id="profileStatus">Select a plate to view its altitude profile.</div>
    </section>

    <section class="legend">
      <h2>Legend</h2>
      <div class="legend-row"><span class="swatch" style="background:#ffd166"></span>ILS threshold</div>
      <div class="legend-row"><span class="swatch swatch-tri" style="border-color:#90be6d"></span>IAF</div>
      <div class="legend-row"><span class="swatch" style="background:#ff9f1c"></span>FAF</div>
      <div class="legend-row"><span class="swatch swatch-hex" style="border-color:#4cc9f0"></span>VOR</div>
      <div class="legend-row"><span class="swatch swatch-tri" style="border-color:#a8ff78; background:rgba(168,255,120,0.25)"></span>Airport</div>
      <div class="legend-row"><span class="swatch" style="background:#c9b8ff"></span>Waypoint</div>
    </section>
  </aside>

  <main class="viewport">
    <canvas id="mapCanvas"></canvas>
  </main>

  <!-- Hover tooltip (positioned by JS) -->
  <div id="tooltip" style="display:none"></div>

  <script src="./app.js"></script>
</body>
</html>
